global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: order-service
    static_configs:
      - targets: ["order-service:8080"]

  - job_name: analytics-service
    static_configs:
      - targets: ["analytics-service:8081"]

  - job_name: mysql-order
    static_configs:
      - targets: ["mysqld-exporter-order:9104"]

  - job_name: mysql-analytics
    static_configs:
      - targets: ["mysqld-exporter-analytics:9104"]

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: rabbitmq
    static_configs:
      - targets: ["rabbitmq-exporter:9419"]
