services:
  # MySQL for Order Service
  order-db:
    image: mysql:8.0
    container_name: order-db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: order_db
      MYSQL_USER: orderuser
      MYSQL_PASSWORD: orderpass
      MYSQL_SSL_MODE: DISABLED
    ports:
      - "3306:3306"
    volumes:
      - order-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MySQL for Analytics Service
  analytics-db:
    image: mysql:8.0
    container_name: analytics-db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: analytics_db
      MYSQL_USER: analyticsuser
      MYSQL_PASSWORD: analyticspass
      MYSQL_SSL_MODE: DISABLED
    ports:
      - "3307:3306"
    volumes:
      - analytics-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (shared cache)
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Order Service
  order-service:
    build:
      context: .
      dockerfile: services/order-service/Dockerfile
    container_name: order-service
    environment:
      DB_HOST: order-db
      DB_PORT: 3306
      DB_USER: orderuser
      DB_PASSWORD: orderpass
      DB_NAME: order_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      INTERNAL_AUTH_KEY: ${INTERNAL_AUTH_KEY:-dev-internal-key-change-me}
      SERVICE_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      order-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  # Analytics Service
  analytics-service:
    build:
      context: .
      dockerfile: services/analytics-service/Dockerfile
    container_name: analytics-service
    environment:
      DB_HOST: analytics-db
      DB_PORT: 3306
      DB_USER: analyticsuser
      DB_PASSWORD: analyticspass
      DB_NAME: analytics_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      INTERNAL_AUTH_KEY: ${INTERNAL_AUTH_KEY:-dev-internal-key-change-me}
      SERVICE_PORT: 8081
    ports:
      - "8081:8081"
    depends_on:
      analytics-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  # Notification Worker
  notification-worker:
    build:
      context: .
      dockerfile: services/notification-worker/Dockerfile
    container_name: notification-worker
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

volumes:
  order-db-data:
  analytics-db-data:
